{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center mt-5">
    <div class="card shadow-lg border-0" style="width: 400px; border-radius: 20px;">
        <div class="card-body p-5 text-center">
            <div class="mb-4">
                <i class="fas fa-lock fa-3x text-primary"></i>
            </div>
            <h4 class="fw-bold mb-3">Zone Réservée</h4>
            <p class="text-muted mb-4">Veuillez saisir le mot de passe administrateur pour accéder à l'inventaire.</p>
            
            <form method="POST" autocomplete="off">
    {% csrf_token %}

    <input type="text" name="fake_user" style="display:none;" aria-hidden="true">
    <input type="password" name="fake_password" style="display:none;" aria-hidden="true">

    <div class="mb-3 text-start">
        <label class="form-label small fw-bold">Mot de passe du patron</label>
        <input type="password"
               name="password"
               class="form-control border-2 text-center"
               placeholder="••••••••"
               required
               autofocus
               autocomplete="new-password">
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary py-2 fw-bold rounded-pill">
            Accéder à l'inventaire
        </button>
        <a href="{% url 'dashboard' %}" class="btn btn-link text-muted">Retour au Dashboard</a>
    </div>
</form>
        </div>
    </div>
</div>
{% endblock %}
