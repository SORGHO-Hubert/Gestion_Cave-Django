{% extends 'base.html' %}
{% block content %}
<style>
    /* Ajoute l'animation ici */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Il faut aussi dire au tableau d'utiliser cette animation */
    #corps-panier tr {
        animation: fadeIn 0.4s ease-out;
    }
</style>
<div class="container-fluid px-4 py-4" style="background-color: #f4f7f6;">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm" style="border-radius: 15px;">
                <div class="card-header border-0 py-3" style="background: #1a252f; border-radius: 15px 15px 0 0;">
                    <h5 class="text-white mb-0"><i class="fas fa-plus-circle me-2 text-info"></i>Nouvelle Ligne</h5>
                </div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label class="small fw-bold text-muted">NOM DU CLIENT</label>
                        <input type="text" id="nom_client" class="form-control border-0 bg-light" placeholder="Client passage..." style="border-radius: 8px;">
                    </div>
                    <hr class="opacity-10">
                    <div class="mb-3">
                        <label class="small fw-bold text-muted">PRODUIT</label>
                        <select id="select-produit" class="form-select border-0 bg-light" style="border-radius: 8px;">
                            <option value="">Choisir un article...</option>
                            {% for p in produits %}
                            <option value="{{ p.id }}" data-prix="{{ p.prix }}">{{ p.nom }} ({{ p.quantite }} en stock)</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="small fw-bold text-muted">QUANTITÉ</label>
                        <input type="number" id="input-qte" class="form-control border-0 bg-light" value="1" min="1">
                    </div>
                    <button type="button" onclick="ajouterAuPanier()" class="btn btn-info text-white w-100 fw-bold py-3 shadow-sm">
                        <i class="fas fa-plus-circle"></i> AJOUTER AU TICKET
                    </button>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card border-0 shadow-sm h-100" style="border-radius: 15px;">
                <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0" style="color: #1a252f;">Ticket de Caisse</h5>
                    <span id="date-ticket" class="badge bg-light text-muted p-2"></span>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="small text-uppercase text-muted">
                                <tr>
                                    <th>Article</th>
                                    <th>Prix</th>
                                    <th class="text-center">Qté</th>
                                    <th>Total</th>
                                    <th class="text-end"></th>
                                </tr>
                            </thead>
                            <tbody id="corps-panier">
                                </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer border-0 p-4" style="background: #1a252f; border-radius: 0 0 15px 15px;">
                    <div class="row align-items-center">
                        <div class="col-sm-6">
                            <span class="text-white-50 small d-block">NET À PAYER</span>
                            <h2 class="text-info fw-bold mb-0"><span id="total-final">0</span> FCFA</h2>
                        </div>
                        <div class="col-sm-6 text-end">
                            {% csrf_token %}
                            <button type="button" onclick="validerVente()" class="btn btn-info btn-lg px-5 fw-bold shadow-sm" style="border-radius: 10px; color: #1a252f;">
                                <i class="fas fa-check-double me-2"></i>VALIDER LA VENTE
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
// Initialisation du panier au chargement de la page
let panier = [];

function ajouterAuPanier() {
    const produitSelect = document.getElementById('select-produit');
    const qteInput = document.getElementById('input-qte');
    const corpsTableau = document.getElementById('corps-panier');

    // Alerte si aucun produit n'est sélectionné
    if (!produitSelect.value) {
        Swal.fire({
            title: 'Attention !',
            text: 'Choisissez un produit avant de l\'ajouter.',
            icon: 'warning',
            confirmButtonColor: '#1a252f'
        });
        return;
    }

    const option = produitSelect.options[produitSelect.selectedIndex];
    const prix = parseFloat(option.getAttribute('data-prix'));
    const nom = option.text.split('(')[0].trim();
    const qte = parseInt(qteInput.value);

    // Validation de la quantité
    if (qte <= 0 || isNaN(qte)) {
        Swal.fire('Erreur', 'Veuillez entrer une quantité valide.', 'error');
        return;
    }

    const totalLigne = prix * qte;

    // 1. Ajout à l'objet panier (Données)
    panier.push({
        id: produitSelect.value,
        nom: nom,
        prix: prix,
        qte: qte,
        total: totalLigne
    });

    // 2. Mise à jour visuelle (Tableau HTML)
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td class="fw-bold">${nom}</td>
        <td>${prix} FCFA</td>
        <td class="text-center">${qte}</td>
        <td class="fw-bold text-info">${totalLigne} FCFA</td>
        <td class="text-end">
            <button type="button" class="btn btn-sm text-danger" onclick="supprimerLigne(this, ${panier.length - 1})">
                <i class="fas fa-trash"></i>
            </button>
        </td>
    `;
    corpsTableau.appendChild(tr);

    // 3. Mise à jour du prix total affiché
    majTotal();
}

function majTotal() {
    let totalGlobal = 0;
    panier.forEach(item => totalGlobal += item.total);
    document.getElementById('total-final').innerText = totalGlobal;
}

function supprimerLigne(btn, index) {
    // Supprime du panier et du tableau
    panier.splice(index, 1);
    btn.closest('tr').remove();
    majTotal();
}

function validerVente() {
    const client = document.getElementById('nom_client').value || "Client passage";

    if (panier.length === 0) {
        Swal.fire('Ticket vide', 'Ajoutez au moins un produit avant de valider.', 'error');
        return;
    }

    const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    // Envoi des données vers Django
    fetch('/valider-vente/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrftoken
        },
        body: JSON.stringify({
            client: client,
            articles: panier
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            Swal.fire({
                title: 'Vente réussie !',
                text: 'Voulez-vous voir et télécharger le reçu ?',
                icon: 'success',
                showCancelButton: true,
                confirmButtonColor: '#1a252f',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Voir le reçu',
                cancelButtonText: 'Plus tard'
            }).then((result) => {
                if (result.isConfirmed) {
                    // REDIRECTION VERS LA PAGE DE REÇU (recu_vente.html)
                    // Utilise l'ID renvoyé par la vue Django
                    window.location.href = "/recu/" + data.vente_id + "/";
                } else {
                    // Si l'utilisateur annule, on va simplement à l'historique
                    window.location.href = "/historique/";
                }
            });
        } else {
            Swal.fire('Erreur', data.message, 'error');
        }
    })
    .catch(error => {
        console.error('Erreur:', error);
        Swal.fire('Erreur Système', 'Impossible de contacter le serveur', 'error');
    });
}
</script>
{% endblock %}
