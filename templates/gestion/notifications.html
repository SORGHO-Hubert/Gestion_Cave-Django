{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-bell me-2"></i> Centre de Notifications</h2>
        <span class="badge bg-primary">{{ notifs.count }} messages</span>
    </div>

    <div class="list-group shadow-sm">
        {% for n in notifs %}
        <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
            <div>
                <small class="text-muted d-block">{{ n.date_creation|date:"d/m/Y H:i" }}</small>
                <span class="fw-bold">{{ n.message }}</span>
            </div>
            <a href="{% url 'supprimer_notification' n.id %}" class="btn btn-outline-danger btn-sm">
                <i class="fas fa-trash"></i> Effacer
            </a>
        </div>
        {% empty %}
        <div class="text-center p-5">
            <i class="fas fa-check-double fa-3x text-muted mb-3"></i>
            <p class="text-muted">Aucune notification pour le moment.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
