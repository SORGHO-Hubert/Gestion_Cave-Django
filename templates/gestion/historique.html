{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Historique des Ventes</h2>
        <div class="badge bg-primary fs-5">Total : {{ ca_total }} FCFA</div>
    </div>

    <form method="GET" class="row g-3 mb-4 card p-3 shadow-sm">
        <div class="col-md-4">
            <input type="text" name="nom_client" class="form-control" placeholder="Nom du client" value="{{ nom_client|default:'' }}">
        </div>
        <div class="col-md-3"><input type="date" name="date_debut" class="form-control"></div>
        <div class="col-md-3"><input type="date" name="date_fin" class="form-control"></div>
        <div class="col-md-2"><button type="submit" class="btn btn-dark w-100">Filtrer</button></div>
    </form>

    <table class="table table-hover shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Date</th>
                <th>Client</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for v in ventes %}
            <tr>
                <td>{{ v.date_vente|date:"d/m/Y H:i" }}</td>
                <td>{{ v.nom_client }}</td>
                <td class="fw-bold">{{ v.total_general }} FCFA</td>
                <td>
                    <a href="{% url 'generer_recu_pdf' v.id %}" target="_blank" class="btn btn-sm btn-outline-info shadow-sm">
                                <i class="fas fa-print me-1"></i> Reçu
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="text-center">Aucune vente enregistrée.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
